<!DOCTYPE html>
<html>
<head>

<title>Disease Detection - Smart Crop Doctor</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
display:flex;
}

.sidebar{
width:220px;
background:#2e7d32;
height:100vh;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:12px 0;
font-size:16px;
}

.sidebar a:hover{
text-decoration:underline;
}

.main{
flex:1;
padding:40px;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#555;
margin-bottom:30px;
}

.upload-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
max-width:600px;
}

input[type="file"]{
margin-top:10px;
}

.preview{
margin-top:20px;
}

.preview img{
max-width:200px;
border-radius:8px;
}

button{
margin-top:20px;
padding:12px 25px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.result-card{
background:white;
margin-top:30px;
padding:30px;
border-radius:10px;
box-shadow:0 5px 25px rgba(0,0,0,0.15);
max-width:650px;
}

.result-title{
font-size:30px;
color:#2e7d32;
font-weight:bold;
margin-bottom:10px;
}

.section{
margin-top:15px;
font-size:18px;
}

.label{
font-weight:bold;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🌱 Smart Crop Doctor</h2>

<a href="/dashboard">Dashboard</a>
<a href="/detect">Disease Detection</a>
<a href="/weather">Weather</a>
<a href="/market">Market</a>

</div>

<div class="main">

<div class="title">Disease Detection</div>

<div class="subtitle">
Upload a photo of a diseased leaf to identify the problem and get treatment advice.
</div>

<div class="upload-box">

<label>Crop Name (Optional)</label>
<input type="text" id="crop" placeholder="Example: Tomato">

<br><br>

<input type="file" id="imageInput" onchange="previewImage()">

<div class="preview">
<img id="previewImg">
</div>

<button onclick="detectDisease()">Run Diagnosis</button>

</div>

<div id="result"></div>

</div>

<script>

function previewImage(){

const file=document.getElementById("imageInput").files[0]

const reader=new FileReader()

reader.onload=function(){
document.getElementById("previewImg").src=reader.result
}

reader.readAsDataURL(file)

}

async function detectDisease(){

const file=document.getElementById("imageInput").files[0]

const formData=new FormData()

formData.append("file",file)

const response=await fetch("/detect",{
method:"POST",
body:formData
})

const data=await response.json()

document.getElementById("result").innerHTML=`

<div class="result-card">

<div class="result-title">
🌿 ${data.disease}
</div>

<div class="section">
<span class="label">Crop:</span> ${data.crop}
</div>

<div class="section">
<span class="label">Description:</span><br>
${data.description}
</div>

<div class="section">
<span class="label">Recommended Treatment:</span><br>
${data.treatment}
<div class="section">
<span class="label">AI Confidence:</span> ${data.confidence}%
</div>
</div>

</div>

`

}

</script>

</body>

</html>
